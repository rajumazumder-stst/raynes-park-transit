<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#060c18"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Raynes Park Transit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-deep:#060c18; --bg-card:#0e1828; --bg-card2:#132035; --border:#1e3050;
      --accent-blue:#2a7fff; --accent-teal:#00c9a7; --accent-amber:#ffb340;
      --accent-red:#ff4d6a; --accent-green:#00e676;
      --highlight-bg:rgba(0,230,118,0.08); --highlight-border:rgba(0,230,118,0.3);
      --text-primary:#e8f0fc; --text-dim:#6a85aa; --text-mid:#9ab0cc;
      --font-mono:'Space Mono',monospace; --font-body:'DM Sans',sans-serif;
      --radius:12px; --radius-sm:8px;
      --district:#007D32; --tramlink:#5FB526; --victoria:#0098D4; --circle:#FFD329;
      --jubilee:#868F98; --bakerloo:#894E24; --northern:#1a1a1a; --wc:#6BCDB2;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;z-index:0;
      background-image:linear-gradient(rgba(42,127,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(42,127,255,0.04) 1px,transparent 1px);
      background-size:40px 40px;pointer-events:none}
    #app{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 16px 40px}

    /* HEADER */
    header{padding:22px 0 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);margin-bottom:18px}
    .logo{display:flex;align-items:center;gap:12px}
    .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-teal));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
    .logo-text{font-family:var(--font-mono);font-size:14px;font-weight:700;letter-spacing:0.04em}
    .logo-sub{font-size:10px;color:var(--text-dim);margin-top:2px;letter-spacing:0.08em;text-transform:uppercase}
    .logo-version{font-size:9px;color:var(--text-dim);margin-top:3px;letter-spacing:0.04em;opacity:0.7}
    #clock{font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--accent-teal);letter-spacing:0.04em}
    #last-updated{font-size:10px;color:var(--text-dim);text-align:right}
    .status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent-teal);display:inline-block;margin-right:5px;box-shadow:0 0 6px var(--accent-teal);animation:pulse-dot 2s infinite}
    @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}

    /* TOP TABS */
    .top-tabs{display:flex;gap:6px;margin-bottom:18px}
    .top-tab{flex:1;padding:11px 8px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-dim);font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;text-align:center}
    .top-tab:hover{border-color:var(--accent-blue);color:var(--text-primary)}
    .top-tab.active{background:linear-gradient(135deg,rgba(42,127,255,0.18),rgba(0,201,167,0.1));border-color:var(--accent-blue);color:var(--accent-teal)}
    .tab-icon{font-size:15px;display:block;margin-bottom:3px}

    /* SCROLL TABS (neighbourhood + station) */
    .scroll-tabs-wrap{overflow-x:auto;margin-bottom:18px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .scroll-tabs-wrap::-webkit-scrollbar{display:none}
    .scroll-tabs{display:flex;gap:6px;padding-bottom:2px;width:max-content}
    .scroll-tab{padding:8px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;color:var(--text-dim);font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;white-space:nowrap}
    .scroll-tab:hover{border-color:var(--accent-blue);color:var(--text-primary)}
    .scroll-tab.bus.active{background:rgba(42,127,255,0.15);border-color:var(--accent-blue);color:var(--accent-teal)}
    .scroll-tab.rail.active{background:rgba(255,179,64,0.15);border-color:var(--accent-amber);color:var(--accent-amber)}

    /* SUBGROUP */
    .subgroup{margin-bottom:22px}
    .subgroup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;cursor:pointer;user-select:none}
    .subgroup-label{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim)}
    .subgroup-toggle{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);background:none;border:1px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;transition:all 0.2s}
    .subgroup-toggle:hover{border-color:var(--accent-blue);color:var(--accent-blue)}
    .subgroup-content.collapsed{display:none}

    /* FILTER BAR */
    .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .filter-btn{padding:6px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;color:var(--text-dim);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px}
    .filter-btn:hover{border-color:var(--accent-blue);color:var(--text-primary)}
    .filter-btn.active{background:var(--highlight-bg);border-color:var(--highlight-border);color:var(--accent-green)}
    .filter-dot{width:7px;height:7px;border-radius:50%;background:var(--accent-green);flex-shrink:0}
    .seg-control{display:flex;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:3px;gap:2px;flex-shrink:0}
    .seg-btn{padding:4px 10px;border-radius:14px;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.05em;cursor:pointer;border:none;background:none;color:var(--text-dim);transition:all 0.2s;white-space:nowrap}
    .seg-btn.active{background:var(--accent-amber);color:#000}

    /* SECTION LABEL */
    .section-label{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;padding-left:2px}

    /* ALERT */
    .alert-banner{background:rgba(255,77,106,0.1);border:1px solid rgba(255,77,106,0.35);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;font-size:13px;color:#ff8fa0;display:none;align-items:flex-start;gap:10px}
    .alert-banner.visible{display:flex}
    .alert-icon{font-size:15px;flex-shrink:0;margin-top:1px}
    .alert-text{line-height:1.5}

    /* STOP CARD */
    .stop-grid{display:grid;gap:12px}
    @media(min-width:640px){.stop-grid.two-col{grid-template-columns:1fr 1fr}}
    .stop-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color 0.2s;margin-bottom:0}
    .stop-card:hover{border-color:rgba(42,127,255,0.4)}
    .stop-header{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--bg-card2);border-bottom:1px solid var(--border)}
    .stop-name-row{display:flex;align-items:center;gap:9px;min-width:0}
    .stop-badge{min-width:32px;height:28px;padding:0 6px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-teal));border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:0.02em}
    .stop-name{font-size:13px;font-weight:600}
    .stop-sub{font-size:11px;color:var(--text-mid);margin-top:1px}
    .stop-routes{font-size:10px;color:var(--text-dim);margin-top:2px}
    .plat-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
    .plat-chip{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--text-dim);background:rgba(30,48,80,0.8);border:1px solid var(--border);border-radius:4px;padding:2px 5px}
    .stop-refresh-btn{background:none;border:1px solid var(--border);border-radius:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-dim);font-size:13px;transition:all 0.2s;flex-shrink:0}
    .stop-refresh-btn:hover{border-color:var(--accent-blue);color:var(--accent-blue)}
    .stop-refresh-btn.spinning{animation:spin 0.6s linear infinite}
    .station-refresh-btn{background:none;border:1px solid var(--border);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-dim);font-size:15px;transition:all 0.2s;margin-left:auto;flex-shrink:0}
    .station-refresh-btn:hover{border-color:var(--accent-amber);color:var(--accent-amber)}
    .station-refresh-btn.spinning{animation:spin 0.6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* DEPARTURE ROW */
    .departure-row{display:grid;grid-template-columns:42px 1fr auto auto auto;align-items:center;gap:8px;padding:8px 13px;border-bottom:1px solid rgba(30,48,80,0.6);transition:background 0.15s}
    .departure-row:last-child{border-bottom:none}
    .departure-row:hover{background:rgba(42,127,255,0.04)}
    .departure-row.highlight{background:var(--highlight-bg);border-left:2px solid var(--accent-green);padding-left:11px}

    /* ROUTE PILLS */
    .route-pill{display:inline-flex;align-items:center;justify-content:center;border-radius:5px;font-family:var(--font-mono);font-size:11px;font-weight:700;padding:3px 5px;min-width:36px;text-align:center}
    .pill-bus{background:rgba(42,127,255,0.15);border:1px solid rgba(42,127,255,0.3);color:var(--accent-blue)}
    .pill-SW{background:rgba(255,179,64,0.12);border:1px solid rgba(255,179,64,0.3);color:var(--accent-amber)}
    .pill-TL{background:rgba(0,160,200,0.15);border:1px solid rgba(0,160,200,0.35);color:#00a0c8}
    .pill-SN{background:rgba(0,150,90,0.15);border:1px solid rgba(0,150,90,0.35);color:#00c878}
    .pill-SE{background:rgba(0,115,170,0.15);border:1px solid rgba(0,115,170,0.35);color:#0090d4}
    .pill-LO{background:rgba(239,123,16,0.15);border:1px solid rgba(239,123,16,0.35);color:#ef7b10}
    .pill-GX{background:rgba(130,40,110,0.15);border:1px solid rgba(130,40,110,0.35);color:#c060b0}
    .pill-tube-district{background:var(--district);border:none;min-width:28px;height:20px}
    .pill-tube-tramlink{background:var(--tramlink);border:none;min-width:28px;height:20px}
    .pill-tube-victoria{background:var(--victoria);border:none;min-width:28px;height:20px}
    .pill-tube-jubilee{background:var(--jubilee);border:none;min-width:28px;height:20px}
    .pill-tube-bakerloo{background:var(--bakerloo);border:none;min-width:28px;height:20px}
    .pill-tube-northern{background:var(--northern);border:1px solid #444;min-width:28px;height:20px}
    .pill-tube-wc{background:var(--wc);border:none;min-width:28px;height:20px}
    .pill-tube-circle{background:#FFD329;border:none;min-width:28px;height:20px}

    .dest-wrap{min-width:0}
    .destination{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .highlight-badge{display:inline-block;font-size:9px;font-weight:700;background:var(--accent-green);color:#000;border-radius:3px;padding:1px 4px;margin-left:5px;vertical-align:middle;text-transform:uppercase}
    .dep-note{font-size:10px;color:var(--text-dim);margin-top:1px}
    .dep-time{font-family:var(--font-mono);font-size:11px;color:var(--text-mid);text-align:right}
    .dep-mins{font-family:var(--font-mono);font-size:14px;font-weight:700;text-align:right;min-width:44px}
    .dep-mins.due{color:var(--accent-red)}
    .dep-mins.soon{color:var(--accent-amber)}
    .dep-mins.normal{color:var(--accent-teal)}
    .plat-tag{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);background:rgba(30,48,80,0.8);border:1px solid var(--border);border-radius:4px;padding:2px 5px;white-space:nowrap;text-align:center}

    /* STATES */
    .state-row{padding:16px 13px;text-align:center;color:var(--text-dim);font-size:13px}
    .loading-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent-blue);margin:0 3px;animation:bounce 1.2s infinite}
    .loading-dots span:nth-child(2){animation-delay:0.2s}
    .loading-dots span:nth-child(3){animation-delay:0.4s}
    @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-6px);opacity:1}}

    /* PANELS */
    .panel{display:none}
    .panel.active{display:block}
    .neighbourhood-panel{display:none}
    .neighbourhood-panel.active{display:block}
    .station-panel{display:none}
    .station-panel.active{display:block}

    footer{text-align:center;font-size:11px;color:var(--text-dim);margin-top:28px;padding-top:14px;border-top:1px solid var(--border)}
  </style>
</head>

    <div id="neighbourhoodPanels"></div>

</div>

function minsLabel(m){ if(m<=0) return{text:'Due',cls:'due'}; if(m<=3) return{text:m+' min',cls:'due'}; if(m<=8) return{text:m+' min',cls:'soon'}; return{text:m+' min',cls:'normal'}; }
function minsFromNow(s){
  if(!s) return null;
  const now=new Date(); let t;
  if(s.includes('T')){ t=new Date(s); }
  else{ const[h,m]=s.split(':').map(Number); t=new Date(); t.setHours(h,m,0,0); if(t<now) t.setDate(t.getDate()+1); }
  return Math.round((t-now)/60000);
}
function fmtTime(s){ if(!s) return '--:--'; if(s.includes('T')) return s.slice(11,16); return s.slice(0,5); }
function isHighlight(dest,callingPoints){
  if(!dest && !callingPoints) return false;
  // Check calling points first if available
  if(callingPoints && callingPoints.length){
    return callingPoints.some(cp=>HIGHLIGHT_STOPS.some(h=>cp.toLowerCase().includes(h.toLowerCase())));
  }
  // Fallback to destination name
  if(!dest) return false;
  return HIGHLIGHT_STOPS.some(h=>dest.toLowerCase().includes(h.toLowerCase()));
}
function loadingHTML(){ return '<div class="state-row"><div class="loading-dots"><span></span><span></span><span></span></div></div>'; }
function errorHTML(msg){ return `<div class="state-row" style="color:var(--accent-red)">⚠ ${msg}</div>`; }
function setUpdated(){ document.getElementById('last-updated').innerHTML='<span class="status-dot"></span>Updated '+new Date().toTimeString().slice(0,5); }
function getLetter(stop){ return stop.letter !== undefined ? stop.letter : stop.key.split('_').pop(); }

// DEPARTURE ROW RENDERER
// ══════════════════════════════════════════════════════════════════
function depRow(r, type, crs){
  const l = minsLabel(r.mins);
  const hi = type!=='bus' && isHighlight(r.dest,r.callingPoints);
  const pillClass = type==='bus' ? 'pill-bus' : (r.pillClass || OP_PILL[r.op] || 'pill-SW');
  const platTag = r.plat ? `<div class="plat-tag">Plat ${r.plat}</div>` : (type==='bus' ? '' : (type==='tube'||type==='tram' ? '' : '<div class="plat-tag">TBA</div>'));
  return `<div class="departure-row${hi?' highlight':''}">
    <div><span class="route-pill ${pillClass}">${r.route||''}</span></div>
    <div class="dest-wrap">
      <div class="destination">${r.dest||'—'}${hi?'<span class="highlight-badge">★</span>':''}</div>
      ${r.note?`<div class="dep-note">${r.note}</div>`:''}
    </div>
    <div class="dep-time">${r.time||'--:--'}</div>
    <div class="dep-mins ${l.cls}">${l.text}</div>
    ${platTag}
  </div>`;
}

function renderRows(rows, type, crs){
  const showFilter = filterActive[crs];
  const filtered = showFilter ? rows.filter(r=>isHighlight(r.dest,r.callingPoints)) : rows;
  if(!filtered.length) return showFilter
    ? '<div class="state-row">No services to Raynes Park / Wimbledon Chase</div>'
    : '<div class="state-row">No upcoming departures</div>';
  return filtered.map(r=>depRow(r,type,crs)).join('');
}

function selectNeighbourhood(id){
  currentNeigh=id;
  document.querySelectorAll('#neighbourhoodTabs .scroll-tab').forEach(t=>t.classList.toggle('active',t.dataset.id===id));
  document.querySelectorAll('.neighbourhood-panel').forEach(p=>p.classList.toggle('active',p.id==='npanel-'+id));
  const n=NEIGHBOURHOODS.find(x=>x.id===id);
  if(!n) return;
  if(!loadedNeigh.has(id)){
    loadedNeigh.add(id);
    const stops=getAllStops(n);
    stops.forEach(s=>fetchBusStop(s.key));
  }
}

function getAllStops(n){
  if(n.flat) return n.stops||[];
  return (n.subgroups||[]).flatMap(sg=>sg.stops);
}

function toggleSubgroup(header){
  const content=header.nextElementSibling;
  const btn=header.querySelector('.subgroup-toggle');
  const collapsed=content.classList.contains('collapsed');
  content.classList.toggle('collapsed',!collapsed);
  btn.textContent=collapsed?'Hide':'Show';
}

// BUS — FETCH
// ══════════════════════════════════════════════════════════════════
function findStop(key){
  for(const n of NEIGHBOURHOODS){
    const stops=getAllStops(n);
    const s=stops.find(x=>x.key===key);
    if(s) return s;
  }
  return null;
}

async function fetchBusStop(key){
  const stop=findStop(key);
  if(!stop) return;
  const el=document.getElementById('deps-'+key);
  if(el) el.innerHTML=loadingHTML();
  try{
    // Tram stops use the Line arrivals endpoint
    const url = stop.isTram
      ? `https://api.tfl.gov.uk/Line/tram/Arrivals/${stop.naptan}?app_key=${TFL_KEY}`
      : `https://api.tfl.gov.uk/StopPoint/${stop.naptan}/Arrivals?app_key=${TFL_KEY}`;
    const res=await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(!Array.isArray(data)) throw new Error('Invalid response');
    const isTram = stop.isTram;
    const rows=data
      .filter(d=>!isTram || d.direction==='inbound')
      .sort((a,b)=>a.timeToStation-b.timeToStation).slice(0,6).map(d=>({
        route: isTram ? '' : d.lineName,
        pillClass: isTram ? 'pill-tube-tramlink' : null,
        dest: d.destinationName||d.towards||'—',
        mins: Math.round(d.timeToStation/60), time: fmtTime(d.expectedArrival), note:null, plat:null,
      }));
    busCache[key]=rows;
    const type = isTram ? 'tram' : 'bus';
    if(el) el.innerHTML=rows.length ? rows.map(r=>depRow(r,type,null)).join('') : '<div class="state-row">No upcoming departures</div>';
  }catch(e){
    if(el) el.innerHTML=errorHTML('Could not load');
  }
}

async function refreshBusStop(key){
  const btn=document.getElementById('btn-'+key);
  if(btn) btn.classList.add('spinning');
  await fetchBusStop(key);
  if(btn) btn.classList.remove('spinning');
  setUpdated();
}

  const n=NEIGHBOURHOODS.find(x=>x.id==='raynes-park');

  const stops=getAllStops(n);
  await Promise.all(stops.map(s=>fetchBusStop(s.key)));
  loadedNeigh.add('raynes-park');
  setUpdated();
}

async function toggleFilter(crs){
  filterActive[crs]=!filterActive[crs];
  const btn=document.getElementById('filter-'+crs);
  if(btn) btn.classList.toggle('active',filterActive[crs]);
  if(!filterActive[crs]){
    // Filter turned off — re-render with cached data
    if(stationCache[crs]) renderStationData(crs,stationCache[crs]);
    return;
  }
  // Filter turned on — fetch calling points for each service
  if(!stationCache[crs]) return;
  const container=document.getElementById('platforms-'+crs);
  if(container) container.innerHTML=loadingHTML();
  const services=(stationCache[crs].nrData&&stationCache[crs].nrData.services)||[];
  // Fetch calling points for all services in parallel
  await Promise.all(services.map(async svc=>{
    if(svc.callingPoints) return; // already fetched
    if(!svc.serviceId) return;
    try{
      const res=await fetch(`/api/calling-points?serviceId=${encodeURIComponent(svc.serviceId)}`,{signal:AbortSignal.timeout(8000)});
      if(!res.ok) return;
      const data=await res.json();
      svc.callingPoints=data.callingPoints||[];
    }catch(e){ svc.callingPoints=[]; }
  }));
  renderStationData(crs,stationCache[crs]);
}

// RAIL — FETCH
// ══════════════════════════════════════════════════════════════════
async function fetchStation(crs){
  const st=STATIONS.find(s=>s.crs===crs);
  if(!st) return;
  document.getElementById('platforms-'+crs).innerHTML=loadingHTML();
  try{
    const [nrData, tubeData, tramData] = await Promise.all([
      fetchNR(crs),
      st.tube  ? fetchTubeLines(st.tube)  : Promise.resolve(null),
      st.tram  ? fetchTubeLines(st.tram)  : Promise.resolve(null),
    ]);
    stationCache[crs]={nrData,tubeData,tramData};
    renderStationData(crs,stationCache[crs]);
    setUpdated();
  }catch(e){
    document.getElementById('platforms-'+crs).innerHTML=errorHTML('Could not load station data');
  }
}

async function fetchNR(crs){
  const res=await fetch(`/api/trains?crs=${crs}&rows=50`,{signal:AbortSignal.timeout(12000)});
  if(!res.ok) throw new Error('HTTP '+res.status);
  const data=await res.json();
  if(data.error) throw new Error(data.error);
  return data;
}

async function fetchTubeLines(lines){
  const results={};
  await Promise.all(lines.map(async l=>{
    try{
      const res=await fetch(`https://api.tfl.gov.uk/Line/${l.line}/Arrivals/${l.stopId}?app_key=${TFL_KEY}`);
      if(!res.ok) return;
      results[l.line]=await res.json();
    }catch(e){ results[l.line]=[]; }
  }));
  return results;
}

// ══════════════════════════════════════════════════════════════════
// RAIL — RENDER
// ══════════════════════════════════════════════════════════════════
function renderStationData(crs,{nrData,tubeData,tramData}){
  const st=STATIONS.find(s=>s.crs===crs);
  const container=document.getElementById('platforms-'+crs);
  if(!container) return;

  // NR: parse services
  const byPlat={};
  let affectedCount=0;
  const nrMessages=(nrData&&nrData.messages)||[];

  ((nrData&&nrData.services)||[]).forEach(svc=>{
    const plat=svc.platform||'TBA';
    const std=svc.std; const etd=svc.etd;
    const isCancelled=etd==='Cancelled';
    const isDelayed=etd&&etd!=='On time'&&etd!=='Cancelled'&&etd!==std&&/^\d{2}:\d{2}$/.test(etd);
    if(isCancelled){ affectedCount++; return; }
    if(isDelayed) affectedCount++;
    const displayTime=(etd&&/^\d{2}:\d{2}$/.test(etd))?etd:(std||'--:--');
    const mins=minsFromNow(displayTime);
    if(mins===null||mins<-2||mins>30) return;
    if(!byPlat[plat]) byPlat[plat]=[];

    // Determine operator pill
    const atoc=(svc.operatorCode||svc.operator||svc.atocCode||'').toUpperCase();
    const op=ATOC_MAP[atoc]||'';

    byPlat[plat].push({
      route:op, op, dest:svc.destination||'—', mins, time:displayTime,
      note:isDelayed?`⚠ was ${std}`:null, plat,
      callingPoints:svc.callingPoints||null,
      serviceId:svc.serviceId||null,
    });
  });

  // Alerts
  const alertEl=document.getElementById('rail-alert');
  const alertTxt=document.getElementById('rail-alert-text');
  if(affectedCount>0||nrMessages.length>0){
    alertTxt.textContent=nrMessages.length?nrMessages[0]:`${affectedCount} service(s) affected`;
    alertEl.classList.add('visible');
  } else { alertEl.classList.remove('visible'); }

  let html='';

  // ── NR GROUPS (predefined platform groups) ──
  const currentMode = viewMode[crs] || 'grouped';

  if(st.nrGroups && currentMode === 'grouped'){
    // Handle dynamic platform routing (e.g. Clapham Junction plat 17)
    if(st.dynamicPlatforms){
      Object.entries(st.dynamicPlatforms).forEach(([plat, opMap])=>{
        if(!byPlat[plat]) return;
        byPlat[plat].forEach(row=>{
          const targetLabel = opMap[row.op] || 'Other';
          const targetGrp = st.nrGroups.find(g=>g.label===targetLabel);
          if(targetGrp){
            if(!byPlat['_dyn_'+targetLabel]) byPlat['_dyn_'+targetLabel]=[];
            byPlat['_dyn_'+targetLabel].push({...row, plat});
          } else {
            if(!byPlat['_dyn_Other']) byPlat['_dyn_Other']=[];
            byPlat['_dyn_Other'].push({...row, plat});
          }
        });
        delete byPlat[plat];
      });
    }

    // Handle Vauxhall dynamic grouping
    if(st.dynamicGroups && st.crs==='VXH'){
      // Fixed group plats already defined (6,8 = South West Main Line)
      // Remaining: dest=London Waterloo → London Waterloo group
      //            other dest → Waterloo-Reading line
      //            anything else → Other
      const fixedPlats = st.nrGroups.flatMap(g=>g.plats);
      Object.keys(byPlat).forEach(plat=>{
        if(fixedPlats.includes(plat)) return;
        byPlat[plat].forEach(row=>{
          const dest=(row.dest||'').toLowerCase();
          let targetLabel = dest.includes('london waterloo') ? 'London Waterloo' : 'Waterloo-Reading line';
          if(!byPlat['_dyn_'+targetLabel]) byPlat['_dyn_'+targetLabel]=[];
          byPlat['_dyn_'+targetLabel].push({...row, plat});
        });
        delete byPlat[plat];
      });
      // Add dynamic groups to nrGroups rendering
      ['London Waterloo','Waterloo-Reading line','Other'].forEach(label=>{
        const key='_dyn_'+label;
        if(byPlat[key] && byPlat[key].length){
          const rows=byPlat[key].sort((a,b)=>a.mins-b.mins);
          const chips=[...new Set(rows.map(r=>r.plat).filter(Boolean))].map(p=>`<span class="plat-chip">Plat ${p}</span>`).join('');
          html+=`<div class="stop-card" style="margin-bottom:12px">
            <div class="stop-header"><div class="stop-name-row"><div>
              <div class="stop-name">${label}</div>
              <div class="plat-chips">${chips}</div>
            </div></div></div>
            <div>${renderRows(rows,'train',crs)}</div>
          </div>`;
          delete byPlat[key];
        }
      });
    }

    // Handle Clapham Junction dynamic grouping for plat 17
    if(st.dynamicGroups && st.crs==='CLJ'){
      ['Brighton Main Line','London Overground'].forEach(label=>{
        const key='_dyn_'+label;
        if(byPlat[key] && byPlat[key].length){
          // Merge into existing group rows
          const grp = st.nrGroups.find(g=>g.label===label);
          if(grp){
            if(!byPlat['_merge_'+label]) byPlat['_merge_'+label]=[];
            byPlat['_merge_'+label].push(...byPlat[key]);
          }
          delete byPlat[key];
        }
      });
    }

    st.nrGroups.forEach(grp=>{
      const rows=[];
      grp.plats.forEach(p=>{
        if(byPlat[p]) rows.push(...byPlat[p]);
        delete byPlat[p];
      });
      // Merge in any dynamic rows for this group
      const mergeKey='_merge_'+grp.label;
      if(byPlat[mergeKey]){ rows.push(...byPlat[mergeKey]); delete byPlat[mergeKey]; }
      const dynKey='_dyn_'+grp.label;
      if(byPlat[dynKey]){ rows.push(...byPlat[dynKey]); delete byPlat[dynKey]; }
      if(!rows.length) return;
      rows.sort((a,b)=>a.mins-b.mins);
      const chips=grp.plats.map(p=>`<span class="plat-chip">Plat ${p}</span>`).join('');
      html+=`<div class="stop-card" style="margin-bottom:12px">
        <div class="stop-header"><div class="stop-name-row"><div>
          <div class="stop-name">${grp.label}</div>
          <div class="plat-chips">${chips}</div>
        </div></div></div>
        <div>${renderRows(rows,'train',crs)}</div>
      </div>`;
    });
  }

  // ── REMAINING NR PLATFORMS (no predefined group) ──
  // Sort numerically, TBA last
  // Custom platform sort orders for specific stations
  const PLAT_FIRST = { VXH:['8'], CLJ:['11'], WIM:['8'], KNG:['3'] };
  const firstPlat = PLAT_FIRST[crs] || [];

  const remainingPlats=Object.keys(byPlat).filter(p=>!p.startsWith('_')).sort((a,b)=>{
    if(a==='TBA') return 1; if(b==='TBA') return -1;
    const aFirst=firstPlat.indexOf(a), bFirst=firstPlat.indexOf(b);
    if(aFirst>=0 && bFirst<0) return -1;
    if(bFirst>=0 && aFirst<0) return 1;
    if(aFirst>=0 && bFirst>=0) return aFirst-bFirst;
    const na=parseInt(a), nb=parseInt(b);
    if(isNaN(na)&&isNaN(nb)) return a.localeCompare(b);
    if(isNaN(na)) return 1; if(isNaN(nb)) return -1;
    return na-nb;
  });

  remainingPlats.forEach(plat=>{
    const rows=byPlat[plat].sort((a,b)=>a.mins-b.mins);
    if(!rows.length) return;
    const isTBA=plat==='TBA';
    html+=`<div class="stop-card" style="margin-bottom:12px">
      <div class="stop-header">
        <div class="stop-name-row"><div>
          <div class="stop-name">${isTBA?'Platform TBA':'Platform '+plat}</div>
          ${isTBA?'<div class="stop-sub">Platform not yet assigned</div>':''}
          <div class="plat-chips"><span class="plat-chip">Plat ${plat}</span></div>
        </div></div>
      </div>
      <div>${renderRows(rows,'train',crs)}</div>
    </div>`;
  });

  // ── TUBE ──
  if(tubeData&&st.tube){
    html+=`<div class="section-label" style="margin-top:8px">London Underground</div>`;
    st.tube.forEach(lineCfg=>{
      const arrivals=tubeData[lineCfg.line]||[];
      if(!arrivals.length) return;
      // Group by platform
      const tubePlats={};
      arrivals.forEach(a=>{
        const p=a.platformName||lineCfg.line;
        if(!tubePlats[p]) tubePlats[p]=[];
        const mins=Math.round(a.timeToStation/60);
        if(mins>15) return;
        tubePlats[p].push({
          route:'', pillClass:lineCfg.pillClass,
          dest:a.destinationName||a.towards||'—',
          mins, time:fmtTime(a.expectedArrival),
          note:a.platformName||null, plat:null,
        });
      });
      // For district at Wimbledon — combine all platforms into one card
      const isCombined = lineCfg.line==='district';
      if(isCombined){
        const allRows=Object.values(tubePlats).flat().sort((a,b)=>a.mins-b.mins);
        if(!allRows.length) return;
        // Add platform info as note
        arrivals.forEach(a=>{
          const mins=Math.round(a.timeToStation/60);
          if(mins>15) return;
        });
        // Build combined rows with plat from platformName
        const combinedRows=arrivals
          .filter(a=>Math.round(a.timeToStation/60)<=15)
          .sort((a,b)=>a.timeToStation-b.timeToStation)
          .map(a=>({
            route:'', pillClass:lineCfg.pillClass,
            dest:a.destinationName||a.towards||'—',
            mins:Math.round(a.timeToStation/60),
            time:fmtTime(a.expectedArrival),
            note:a.towards||null,
            plat:a.platformName?(a.platformName.replace(/[^\d]/g,'')||null):null,
          }));
        const platNums=[...new Set(arrivals.map(a=>a.platformName).filter(Boolean))];
        const chips=platNums.map(p=>{const m=p.match(/\d+[ab]?$/i);return`<span class="plat-chip">Plat ${m?m[0]:p}</span>`;}).join('');
        html+=`<div class="stop-card" style="margin-bottom:12px">
          <div class="stop-header"><div class="stop-name-row"><div>
            <div class="stop-name">${lineCfg.label}</div>
            <div class="plat-chips">${chips}</div>
          </div></div></div>
          <div>${combinedRows.map(r=>depRow(r,'tube',crs)).join('')||'<div class="state-row">No upcoming departures</div>'}</div>
        </div>`;
      } else {
        Object.entries(tubePlats).sort(([a],[b])=>a.localeCompare(b)).forEach(([platName,rows])=>{
          if(!rows.length) return;
          // For W&C line hide if no services
          if(lineCfg.line==='waterloo-city'&&!rows.length) return;
          rows.sort((a,b)=>a.mins-b.mins);
          html+=`<div class="stop-card" style="margin-bottom:12px">
            <div class="stop-header"><div class="stop-name-row"><div>
              <div class="stop-name">${lineCfg.label}</div>
              <div class="stop-sub">${platName}</div>
            </div></div></div>
            <div>${rows.map(r=>depRow(r,'tube',crs)).join('')}</div>
          </div>`;
        });
      }
    });
  }

  // ── TRAM ──
  if(tramData&&st.tram){
    html+=`<div class="section-label" style="margin-top:8px">London Trams</div>`;
    st.tram.forEach(lineCfg=>{
      const arrivals=tramData[lineCfg.line]||[];
      if(!arrivals.length) return;
      const rows=arrivals
        .filter(a=>Math.round(a.timeToStation/60)<=15)
        .sort((a,b)=>a.timeToStation-b.timeToStation)
        .map(a=>({
          route:'', pillClass:lineCfg.pillClass,
          dest:a.destinationName||a.towards||'—',
          mins:Math.round(a.timeToStation/60),
          time:fmtTime(a.expectedArrival),
          note:a.towards||null,
          plat:a.platformName?(a.platformName.replace(/Platform\s*/i,'').trim()||null):null,
        }));
      if(!rows.length) return;
      const platNums=[...new Set(arrivals.map(a=>a.platformName).filter(Boolean))];
      const chips=platNums.map(p=>`<span class="plat-chip">${p}</span>`).join('');
      html+=`<div class="stop-card" style="margin-bottom:12px">
        <div class="stop-header"><div class="stop-name-row"><div>
          <div class="stop-name">${lineCfg.label}</div>
          <div class="plat-chips">${chips}</div>
        </div></div></div>
        <div>${rows.map(r=>depRow(r,'tram',crs)).join('')}</div>
      </div>`;
    });
  }

  if(!html) html='<div class="state-row">No departures in the next 30 minutes</div>';
  container.innerHTML=html;
}

setInterval(()=>{
  fetchAllRaynesPark();
  if(currentNeigh && currentNeigh!=='raynes-park'){
    const n=NEIGHBOURHOODS.find(x=>x.id===currentNeigh);
    if(n){ getAllStops(n).forEach(s=>fetchBusStop(s.key)); }
  }
}, 30000);

setInterval(()=>{
  if(currentStation){ loadedStations.delete(currentStation); fetchStation(currentStation); loadedStations.add(currentStation); }
}, 30000);

// Fetch version timestamp from Last-Modified header
(async()=>{
  try{
    const res=await fetch(window.location.pathname,{method:'HEAD'});
    const lm=res.headers.get('Last-Modified');
    if(lm){
      const d=new Date(lm);
      const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const str=`${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      document.getElementById('app-version').textContent='Version: '+str;
    }
  }catch(e){}
})();

buildNeighbourhoodTabs();
buildStationTabs();
currentNeigh='raynes-park';
fetchAllRaynesPark();
</script>
