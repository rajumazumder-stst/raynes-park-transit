<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Operator Code Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-deep:#060c18; --bg-card:#0e1828; --bg-card2:#132035; --border:#1e3050;
      --accent-blue:#2a7fff; --accent-teal:#00c9a7; --accent-amber:#ffb340;
      --accent-red:#ff4d6a; --accent-green:#00e676;
      --text-primary:#e8f0fc; --text-dim:#6a85aa; --text-mid:#9ab0cc;
      --font-mono:'Space Mono',monospace; --font-body:'DM Sans',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);padding:24px 16px 60px;max-width:800px;margin:0 auto}
    body::before{content:'';position:fixed;inset:0;z-index:0;
      background-image:linear-gradient(rgba(42,127,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(42,127,255,0.04) 1px,transparent 1px);
      background-size:40px 40px;pointer-events:none}
    .wrap{position:relative;z-index:1}

    h1{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--accent-teal);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
    .sub{font-size:12px;color:var(--text-dim);margin-bottom:24px;line-height:1.6}

    .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:24px}
    select{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:var(--font-mono);font-size:12px;padding:8px 12px;cursor:pointer;outline:none}
    select:focus{border-color:var(--accent-blue)}
    button{padding:8px 18px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-teal));border:none;border-radius:8px;color:#fff;font-family:var(--font-mono);font-size:12px;font-weight:700;cursor:pointer;transition:opacity 0.2s}
    button:hover{opacity:0.85}
    button:disabled{opacity:0.4;cursor:not-allowed}
    .status{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);padding:6px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px}

    table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
    thead tr{background:var(--bg-card2)}
    th{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
    td{padding:9px 12px;border-bottom:1px solid rgba(30,48,80,0.5);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(42,127,255,0.04)}

    .pill{display:inline-flex;align-items:center;justify-content:center;border-radius:5px;font-family:var(--font-mono);font-size:11px;font-weight:700;padding:3px 8px;min-width:36px;text-align:center}
    .pill-SW{background:rgba(255,179,64,0.12);border:1px solid rgba(255,179,64,0.3);color:#ffb340}
    .pill-TL{background:rgba(0,160,200,0.15);border:1px solid rgba(0,160,200,0.35);color:#00a0c8}
    .pill-SN{background:rgba(0,150,90,0.15);border:1px solid rgba(0,150,90,0.35);color:#00c878}
    .pill-SE{background:rgba(0,115,170,0.15);border:1px solid rgba(0,115,170,0.35);color:#0090d4}
    .pill-LO{background:rgba(239,123,16,0.15);border:1px solid rgba(239,123,16,0.35);color:#ef7b10}
    .pill-GX{background:rgba(130,40,110,0.15);border:1px solid rgba(130,40,110,0.35);color:#c060b0}
    .pill-blank{background:rgba(100,100,100,0.1);border:1px solid rgba(100,100,100,0.2);color:var(--text-dim);font-style:italic}
    .pill-unknown{background:rgba(255,77,106,0.1);border:1px solid rgba(255,77,106,0.3);color:var(--accent-red)}

    .raw-code{font-family:var(--font-mono);font-size:11px;color:var(--text-mid);background:var(--bg-card2);padding:2px 6px;border-radius:4px}
    .raw-blank{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);font-style:italic}
    .time{font-family:var(--font-mono);font-size:11px;color:var(--text-mid)}
    .dest{font-size:13px;font-weight:500}
    .plat{font-family:var(--font-mono);font-size:10px;color:var(--text-dim)}

    .summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .summary-chip{font-family:var(--font-mono);font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--border);color:var(--text-dim)}
    .summary-chip.found{border-color:var(--accent-teal);color:var(--accent-teal)}
    .summary-chip.missing{border-color:var(--accent-red);color:var(--accent-red)}

    .error-box{background:rgba(255,77,106,0.1);border:1px solid rgba(255,77,106,0.3);border-radius:8px;padding:12px 16px;color:#ff8fa0;font-size:13px;margin-top:16px}
    .loading-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent-blue);margin:0 3px;animation:bounce 1.2s infinite}
    .loading-dots span:nth-child(2){animation-delay:0.2s}
    .loading-dots span:nth-child(3){animation-delay:0.4s}
    @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-6px);opacity:1}}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Operator Code Test</h1>
  <p class="sub">Select a station and fetch live departures to verify operator codes returned by the National Rail API, and how they map to display pills.</p>

  <div class="controls">
    <select id="stationSelect">
      <option value="RAY">Raynes Park (RAY)</option>
      <option value="WBO">Wimbledon Chase (WBO)</option>
      <option value="WAT">London Waterloo (WAT)</option>
      <option value="VXH">Vauxhall (VXH)</option>
      <option value="CLJ">Clapham Junction (CLJ)</option>
      <option value="WIM">Wimbledon (WIM)</option>
      <option value="KNG">Kingston (KNG)</option>
      <option value="SNS">Staines (SNS)</option>
      <option value="NEM">New Malden (NEM)</option>
      <option value="WAE">Waterloo East (WAE)</option>
      <option value="BFR">Blackfriars (BFR)</option>
    </select>
    <button id="fetchBtn" onclick="fetchData()">Fetch Departures</button>
    <div class="status" id="status">Ready</div>
  </div>

  <div id="summary" class="summary"></div>
  <div id="results"></div>
</div>

<script>
const ATOC_MAP = {
  'SW':'SW','TL':'TL','SN':'SN','SE':'SE','LO':'LO','GX':'GX',
  'CS':'SW','VT':'SW','XR':'SW',
};

async function fetchData() {
  const crs = document.getElementById('stationSelect').value;
  const btn = document.getElementById('fetchBtn');
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  const summary = document.getElementById('summary');

  btn.disabled = true;
  status.textContent = 'Fetching...';
  results.innerHTML = '<div style="padding:20px;text-align:center"><div class="loading-dots"><span></span><span></span><span></span></div></div>';
  summary.innerHTML = '';

  try {
    const res = await fetch(`/api/trains?crs=${crs}&rows=50`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const services = data.services || [];
    status.textContent = `${services.length} services returned`;

    if (!services.length) {
      results.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim)">No services found</div>';
      return;
    }

    // Build summary of unique operator codes
    const opCodes = [...new Set(services.map(s => s.operatorCode || ''))];
    summary.innerHTML = opCodes.map(code => {
      const mapped = code ? (ATOC_MAP[code.toUpperCase()] || null) : null;
      const cls = !code ? 'missing' : mapped ? 'found' : 'missing';
      const label = code ? `${code} → ${mapped || '?'}` : 'no code';
      return `<span class="summary-chip ${cls}">${label}</span>`;
    }).join('');

    // Build table
    let html = `<table>
      <thead><tr>
        <th>STD</th>
        <th>Destination</th>
        <th>Plat</th>
        <th>Raw operatorCode</th>
        <th>Mapped pill</th>
      </tr></thead>
      <tbody>`;

    services.forEach(svc => {
      const raw = svc.operatorCode || '';
      const mapped = raw ? (ATOC_MAP[raw.toUpperCase()] || null) : null;
      const pillHtml = mapped
        ? `<span class="pill pill-${mapped}">${mapped}</span>`
        : raw
          ? `<span class="pill pill-unknown">? ${raw}</span>`
          : `<span class="pill pill-blank">blank</span>`;
      const rawHtml = raw
        ? `<span class="raw-code">${raw}</span>`
        : `<span class="raw-blank">none</span>`;

      html += `<tr>
        <td class="time">${svc.std||'—'}</td>
        <td class="dest">${svc.destination||'—'}</td>
        <td class="plat">${svc.platform||'TBA'}</td>
        <td>${rawHtml}</td>
        <td>${pillHtml}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    results.innerHTML = html;

  } catch(e) {
    results.innerHTML = `<div class="error-box">⚠ Error: ${e.message}</div>`;
    status.textContent = 'Error';
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
